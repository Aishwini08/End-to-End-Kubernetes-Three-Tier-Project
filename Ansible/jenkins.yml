---
- name: Configure Jenkins Server
  hosts: jenkins
  become: true

  tasks:
    - name: Remove stale Jenkins repo if present
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/jenkins.list
        - /etc/apt/keyrings/jenkins-keyring.asc

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install dependencies
      apt:
        name:
          - curl
          - gnupg
          - wget
          - fontconfig
          - openjdk-21-jre
          - docker.io
          - unzip
        state: present

    - name: Ensure /etc/apt/keyrings directory exists
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add Jenkins GPG key
      shell: |
        wget -O /etc/apt/keyrings/jenkins-keyring.asc \
          https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key

    - name: Add Jenkins repository
      shell: |
        echo "deb [signed-by=/etc/apt/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/" | tee /etc/apt/sources.list.d/jenkins.list > /dev/null

    - name: Update apt cache after Jenkins repo
      apt:
        update_cache: yes

    - name: Install Jenkins
      apt:
        name: jenkins
        state: present

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Start and enable Jenkins
      systemd:
        name: jenkins
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Add jenkins user to docker group
      user:
        name: jenkins
        groups: docker
        append: yes

    - name: Install kubectl
      shell: |
        curl -Lo /tmp/kubectl "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        install -o root -g root -m 0755 /tmp/kubectl /usr/local/bin/kubectl
      args:
        creates: /usr/local/bin/kubectl

    - name: Install Helm
      shell: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm

    - name: Install AWS CLI
      shell: |
        curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "/tmp/awscliv2.zip"
        unzip /tmp/awscliv2.zip -d /tmp/
        /tmp/aws/install
      args:
        creates: /usr/local/bin/aws

    - name: Install Trivy
      shell: |
        curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
      args:
        creates: /usr/local/bin/trivy

    - name: Install OWASP Dependency Check
      shell: |
        wget https://github.com/jeremylong/DependencyCheck/releases/download/v9.0.9/dependency-check-9.0.9-release.zip -O /tmp/dc.zip
        unzip /tmp/dc.zip -d /opt/
        chmod +x /opt/dependency-check/bin/dependency-check.sh
        ln -sf /opt/dependency-check/bin/dependency-check.sh /usr/local/bin/dependency-check
      args:
        creates: /usr/local/bin/dependency-check

    - name: Run SonarQube container
      shell: |
        docker run -d \
          --name sonarqube \
          --restart always \
          -p 9000:9000 \
          -e SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true \
          sonarqube:lts-community
      args:
        creates: /var/sonarqube-installed

    - name: Mark SonarQube as installed
      file:
        path: /var/sonarqube-installed
        state: touch

    - name: Configure Jenkins URL
      shell: |
        JENKINS_IP=$(curl -s http://169.254.169.254/latest/meta-data/public-ipv4)
        mkdir -p /var/lib/jenkins/
        cat > /var/lib/jenkins/jenkins.model.JenkinsLocationConfiguration.xml << EOF
        <?xml version='1.1' encoding='UTF-8'?>
        <jenkins.model.JenkinsLocationConfiguration>
          <adminAddress>address not configured yet</adminAddress>
          <jenkinsUrl>http://${JENKINS_IP}:8080/</jenkinsUrl>
        </jenkins.model.JenkinsLocationConfiguration>
        EOF
        chown jenkins:jenkins /var/lib/jenkins/jenkins.model.JenkinsLocationConfiguration.xml
      args:
        creates: /var/lib/jenkins/jenkins.model.JenkinsLocationConfiguration.xml

    - name: Restart Jenkins after URL config
      systemd:
        name: jenkins
        state: restarted

    - name: Wait for Jenkins to be ready
      uri:
        url: "http://localhost:8080/login"
        status_code: 200
      register: result
      until: result.status == 200
      retries: 20
      delay: 15

    - name: Get Jenkins initial admin password
      slurp:
        src: /var/lib/jenkins/secrets/initialAdminPassword
      register: jenkins_password

    - name: Download Jenkins CLI jar
      get_url:
        url: "http://localhost:8080/jnlpJars/jenkins-cli.jar"
        dest: /tmp/jenkins-cli.jar

    - name: Copy job config to server
      copy:
        src: jenkins-job.xml
        dest: /tmp/jenkins-job.xml

    - name: Create Jenkins pipeline job
      shell: |
        java -jar /tmp/jenkins-cli.jar \
          -s http://localhost:8080 \
          -auth admin:{{ jenkins_password.content | b64decode | trim }} \
          create-job three-tier-pipeline < /tmp/jenkins-job.xml
      ignore_errors: true